<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    --areia-claro: #F8EECA;
    --marrom: #4B2819;
    --vermelho: #8C1923;
    --vermelho-vivo: #D71920;
    --creme: #FAF0D2;
    --gold: #C8922A;
    --gold-bright: #E8A020;
    --brown-dark: #2C1505;
    --brown-mid: #5C3010;
    --verde: #A0A020;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--brown-dark);
    color: var(--creme);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--brown-dark) 0%, var(--marrom) 60%, var(--vermelho) 100%);
    border-bottom: 3px solid var(--gold);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-badge {
    width: 40px; height: 40px;
    background: var(--vermelho-vivo);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 16px;
    color: var(--areia);
    border: 2px solid var(--gold);
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Montserrat', sans-serif;
  }

  .header-title h1 {
    font-size: 15px;
    font-weight: 800;
    color: var(--areia);
    line-height: 1.1;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-title p {
    font-size: 11px;
    color: var(--gold);
    font-weight: 500;
    letter-spacing: 1px;
  }

  .header-stats {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .stat-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(200,146,42,0.3);
    border-radius: 8px;
    padding: 4px 12px;
    min-width: 52px;
  }

  .stat-pill .num {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 18px;
    line-height: 1;
  }

  .stat-pill .lbl {
    font-size: 9px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
  }

  .stat-pill.ativa .num { color: #4ade80; }
  .stat-pill.implant .num { color: var(--gold-bright); }
  .stat-pill.prosp .num { color: #60a5fa; }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    height: calc(100vh - 64px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: linear-gradient(180deg, #1a0a02 0%, var(--brown-dark) 100%);
    border-right: 1px solid rgba(200,146,42,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid rgba(200,146,42,0.15);
  }

  .sidebar-header h2 {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
    background: transparent;
  }

  .filter-btn.all { border-color: var(--gold); color: var(--gold); }
  .filter-btn.ativa { border-color: #4ade80; color: #4ade80; }
  .filter-btn.implant { border-color: var(--gold-bright); color: var(--gold-bright); }
  .filter-btn.prosp { border-color: #60a5fa; color: #60a5fa; }

  .filter-btn.active, .filter-btn:hover {
    color: var(--brown-dark);
  }
  .filter-btn.all.active, .filter-btn.all:hover { background: var(--gold); }
  .filter-btn.ativa.active, .filter-btn.ativa:hover { background: #4ade80; }
  .filter-btn.implant.active, .filter-btn.implant:hover { background: var(--gold-bright); }
  .filter-btn.prosp.active, .filter-btn.prosp:hover { background: #60a5fa; }

  .loja-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .loja-list::-webkit-scrollbar { width: 4px; }
  .loja-list::-webkit-scrollbar-track { background: transparent; }
  .loja-list::-webkit-scrollbar-thumb { background: rgba(200,146,42,0.3); border-radius: 2px; }

  .loja-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    margin-bottom: 4px;
    transition: all 0.2s;
  }

  .loja-item:hover, .loja-item.selected {
    background: rgba(200,146,42,0.1);
    border-color: rgba(200,146,42,0.3);
  }

  .loja-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-ativa { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .dot-implant { background: var(--gold-bright); box-shadow: 0 0 6px var(--gold-bright); }
  .dot-prosp { background: #60a5fa; box-shadow: 0 0 6px #60a5fa; }

  .loja-info { flex: 1; min-width: 0; }

  .loja-cidade {

    font-size: 12px;
    font-weight: 700;
    color: var(--areia);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .loja-estado {
    font-size: 10px;
    color: rgba(200,146,42,0.6);
    font-weight: 600;
    flex-shrink: 0;

  /* ── ROTA PANEL ── */

    border-top: 1px solid rgba(200,146,42,0.15);
  }

  .rota-panel h3 {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;

    border: none;
    border-radius: 8px;
    color: var(--areia);

    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    margin-bottom: 6px;
    text-transform: uppercase;

  .btn-rota-clear {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px solid rgba(200,146,42,0.3);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;

    font-size: 11px;
    color: rgba(250,240,210,0.5);
    text-align: center;
    margin-top: 6px;
  }

  /* ── MAP ── */
  #map {
    flex: 1;
    background: #1a0a02;
  }

  /* ── POPUP CARD ── */
  .popup-card {
    font-family: 'Nunito', sans-serif;
    min-width: 220px;
    padding: 4px;
  }

  .popup-header {
    display: flex;
    align-items: center;

  .popup-dot {

  .badge-implant { background: #fef9c3; color: #713f12; }
  .badge-prosp { background: #dbeafe; color: #1e3a8a; }

    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid rgba(75,40,25,0.08);

  .popup-row .key { color: var(--brown-mid); font-weight: 600; }
  .popup-row .val { color: var(--marrom); font-weight: 700; }

  .popup-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }

  .popup-btn {
    flex: 1;
    padding: 7px;
    border-radius: 6px;
    border: none;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
  }

  .popup-btn-wpp {
    background: #25D366;
    color: white;
  }

  .popup-btn-rota {
    background: var(--vermelho);
    color: white;
  }

  /* ── LEAFLET OVERRIDES ── */
  .leaflet-popup-content-wrapper {
    border-radius: 14px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25) !important;
    border: 2px solid var(--gold) !important;
    padding: 0 !important;
  }

  .leaflet-popup-content {
    margin: 14px !important;
  }

  .leaflet-popup-tip { background: var(--gold) !important; }

  /* Tile escuro */
  .leaflet-tile { filter: brightness(0.85) saturate(0.7); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--marrom);
    color: var(--areia);
    border: 1px solid var(--gold);
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Nunito', sans-serif;
    z-index: 9999;
    transition: transform 0.3s ease;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVO ── */
  @media (max-width: 600px) {
    .sidebar { width: 260px; }
    .header-stats { display: none; }
  }
</style>
</head>

// ═══════════════════════════════════════════════
const COR = {
  ativa:       '#4ade80',
  implantacao: '#E8A020',
  prospecto:   '#60a5fa'

  ativa:       'Ativa',

};

let filtroAtivo = 'all';

// ═══════════════════════════════════════════════
// MAPA
// ═══════════════════════════════════════════════

  center: [-22.5, -45.5],
  zoom: 7,
  zoomControl: true
});

  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

function criarIcone(status, selecionado = false) {
  const cor = COR[status];
  const tamanho = selecionado ? 18 : 14;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${tamanho+12}" height="${tamanho+12}" viewBox="0 0 ${tamanho+12} ${tamanho+12}">
    <circle cx="${(tamanho+12)/2}" cy="${(tamanho+12)/2}" r="${tamanho/2+3}" fill="${cor}" fill-opacity="0.25"/>
    <circle cx="${(tamanho+12)/2}" cy="${(tamanho+12)/2}" r="${tamanho/2}" fill="${cor}" stroke="white" stroke-width="2"/>
    ${selecionado ? `<circle cx="${(tamanho+12)/2}" cy="${(tamanho+12)/2}" r="${tamanho/2+5}" fill="none" stroke="${cor}" stroke-width="2" opacity="0.5"/>` : ''}
  </svg>`;
  const s = tamanho + 12;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [s, s],
    iconAnchor: [s/2, s/2],
    popupAnchor: [0, -(s/2+4)]
  });
}

function buildPopup(l) {
  const cor = COR[l.status];
  const badge = l.status === 'ativa' ? 'badge-ativa' : l.status === 'implantacao' ? 'badge-implant' : 'badge-prosp';
  const dotCls = l.status === 'ativa' ? 'dot-ativa' : l.status === 'implantacao' ? 'dot-implant' : 'dot-prosp';
  const wppHref = l.telefone
    ? `https://wa.me/55${l.telefone.replace(/\D/g,'')}`
    : '#';

  return `
  <div class="popup-card">
    <div class="popup-header">
      <div class="popup-dot loja-dot ${dotCls}" style="background:${cor}; box-shadow: 0 0 6px ${cor}"></div>

        <div class="popup-nome">${l.nome}</div>

}

function initMarcadores() {
  lojas.forEach(l => {
    const m = L.marker([l.lat, l.lng], { icon: criarIcone(l.status) })
      .addTo(map)
      .bindPopup(buildPopup(l), { maxWidth: 280 });

    m.on('click', () => selecionarLoja(l.id));
    marcadores[l.id] = m;
  });
}

// ═══════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════
function renderSidebar() {
  const lista = document.getElementById('lojaList');
  const filtradas = filtroAtivo === 'all' ? lojas : lojas.filter(l => l.status === filtroAtivo);

  lista.innerHTML = filtradas.map(l => {
    const dotCls = l.status === 'ativa' ? 'dot-ativa' : l.status === 'implantacao' ? 'dot-implant' : 'dot-prosp';
    const sel = lojaSelected === l.id ? 'selected' : '';
    return `
      <div class="loja-item ${sel}" onclick="selecionarLoja(${l.id})">
        <div class="loja-dot ${dotCls}"></div>
        <div class="loja-info">
          <div class="loja-cidade">${l.cidade}</div>
          <div class="loja-nome">${l.nome}</div>
        </div>
        <div class="loja-estado">${l.estado}</div>
      </div>`;
  }).join('');
}

function renderStats() {
  const ativas = lojas.filter(l => l.status === 'ativa').length;
  const impl = lojas.filter(l => l.status === 'implantacao').length;
  const prosp = lojas.filter(l => l.status === 'prospecto').length;

  document.getElementById('headerStats').innerHTML = `
    <div class="stat-pill ativa"><span class="num">${ativas}</span><span class="lbl">Ativas</span></div>
    <div class="stat-pill implant"><span class="num">${impl}</span><span class="lbl">Implant.</span></div>
    <div class="stat-pill prosp"><span class="num">${prosp}</span><span class="lbl">Prospec.</span></div>
    <div class="stat-pill"><span class="num" style="color:var(--gold)">${lojas.length}</span><span class="lbl">Total</span></div>
  `;
}

function setFilter(f, btn) {
  filtroAtivo = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // mostra/oculta marcadores
  lojas.forEach(l => {
    const m = marcadores[l.id];
    if (f === 'all' || l.status === f) {
      if (!map.hasLayer(m)) map.addLayer(m);
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  });

  renderSidebar();
}

function selecionarLoja(id) {
  if (lojaSelected && marcadores[lojaSelected]) {
    const ant = lojas.find(l => l.id === lojaSelected);
    marcadores[lojaSelected].setIcon(criarIcone(ant.status, false));
  }

  lojaSelected = id;
  const loja = lojas.find(l => l.id === id);
  marcadores[id].setIcon(criarIcone(loja.status, true));
  map.setView([loja.lat, loja.lng], 12, { animate: true });
  marcadores[id].openPopup();
  renderSidebar();
}

// ═══════════════════════════════════════════════
// ROTA INTELIGENTE
// Algoritmo nearest-neighbor partindo de Pouso Alegre
// ═══════════════════════════════════════════════
function distGeo(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

function nearestNeighbor(pontos, inicio) {
  const visitados = new Set();
  const rota = [inicio];
  visitados.add(inicio.id);

  let atual = inicio;
  while (visitados.size < pontos.length) {
    let melhor = null, menorDist = Infinity;
    pontos.forEach(p => {
      if (!visitados.has(p.id)) {
        const d = distGeo(atual, p);
        if (d < menorDist) { menorDist = d; melhor = p; }
      }
    });
    if (melhor) { rota.push(melhor); visitados.add(melhor.id); atual = melhor; }
  }
  return rota;
}

function gerarRota() {
  const visiveis = filtroAtivo === 'all' ? lojas : lojas.filter(l => l.status === filtroAtivo);
  if (visiveis.length < 2) { showToast('Selecione ao menos 2 praças'); return; }

  // Remove rota anterior
  if (rotaLayer) { map.removeLayer(rotaLayer); rotaLayer = null; }

  const inicio = visiveis.find(l => l.cidade === 'Pouso Alegre') || visiveis[0];
  const rota = nearestNeighbor(visiveis, inicio);

  // Desenha linha no mapa
  const coords = rota.map(l => [l.lat, l.lng]);
  rotaLayer = L.polyline(coords, {
    color: '#E8A020',
    weight: 2.5,
    opacity: 0.8,
    dashArray: '8, 6'
  }).addTo(map);

  map.fitBounds(rotaLayer.getBounds(), { padding: [40, 40] });

  // Numera marcadores
  rota.forEach((l, i) => {
    const cor = COR[l.status];
    const icon = L.divIcon({
      html: `<div style="background:${cor};color:#1a0a02;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:Montserrat,sans-serif;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4)">${i+1}</div>`,
      className: '',
      iconSize: [22, 22],
      iconAnchor: [11, 11],
      popupAnchor: [0, -14]
    });
    marcadores[l.id].setIcon(icon);
  });

  // Monta URL Google Maps
  const waypoints = rota.slice(1, -1).map(l => `${l.lat},${l.lng}`).join('|');
  const origem = `${rota[0].lat},${rota[0].lng}`;
  const destino = `${rota[rota.length-1].lat},${rota[rota.length-1].lng}`;
  const url = `https://www.google.com/maps/dir/?api=1&origin=${origem}&destination=${destino}&waypoints=${waypoints}&travelmode=driving`;

  document.getElementById('rotaInfo').innerHTML =
    `<a href="${url}" target="_blank" style="color:var(--gold-bright);font-weight:700">🗺 Abrir no Google Maps →</a><br><span style="font-size:10px">${rota.length} praças · Otimizado por proximidade</span>`;

  showToast(`Rota gerada: ${rota.length} praças`);
}

function limparRota() {
  if (rotaLayer) { map.removeLayer(rotaLayer); rotaLayer = null; }
  lojas.forEach(l => marcadores[l.id].setIcon(criarIcone(l.status, lojaSelected === l.id)));
  document.getElementById('rotaInfo').textContent = 'Abre rota completa no Google Maps';
  showToast('Rota removida');
}

function abrirRotaUnica(lat, lng, cidade) {
  const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`;
  window.open(url, '_blank');
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
initMarcadores();
renderSidebar();
renderStats();
</script>
</body>
</html>
